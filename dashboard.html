<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workforce Sentinel · interactive console</title>
<script>(function(){try{var t=localStorage.getItem('ws-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b12; --panel:rgba(16,24,40,0.72); --ink:#e8f0fa; --dim:#7d93a8;
  --line:rgba(120,160,200,0.16); --edge:rgba(255,255,255,0.08); --shadow:rgba(0,0,0,0.45);
  --crit:#ff4d5e; --high:#ff8a3d; --med:#ffc24d; --low:#6fb3ff; --ok:#2ee6a6; --accent:#36d3ff;
  --b1:rgba(54,211,255,0.10); --b2:rgba(46,230,166,0.08);
}
html[data-theme="light"]{
  --bg:#eef3f9; --panel:rgba(255,255,255,0.82); --ink:#0f1d2e; --dim:#4a657d;
  --line:rgba(15,40,70,0.14); --edge:rgba(255,255,255,0.7); --shadow:rgba(31,59,92,0.14);
  --crit:#d6334a; --high:#c4502f; --med:#b8860b; --low:#2a6fb0; --ok:#0f9d6b; --accent:#0090c8;
  --b1:rgba(0,144,200,0.12); --b2:rgba(15,157,107,0.10);
}
html{background:var(--bg);-webkit-text-size-adjust:100%}
body{background:radial-gradient(ellipse at 6% -8%,var(--b1),transparent 45%),radial-gradient(ellipse at 98% 0%,var(--b2),transparent 42%),var(--bg);
  color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;line-height:1.45;transition:background .4s,color .4s}
.mono{font-family:'JetBrains Mono','SF Mono',Menlo,monospace}
header{position:sticky;top:0;z-index:30;backdrop-filter:blur(16px);background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 92%,transparent),color-mix(in srgb,var(--bg) 55%,transparent));border-bottom:1px solid var(--line);padding:13px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:900;letter-spacing:-.01em}
header h1 .a{color:var(--accent)}
header .sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
.spacer{flex:1}
.btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;transition:border .2s,transform .12s}
.btn:hover{border-color:var(--accent);transform:translateY(-1px)}
main{max-width:1280px;margin:0 auto;padding:18px 20px 80px}
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--edge);border-radius:14px;padding:14px 16px;backdrop-filter:blur(14px);box-shadow:0 8px 22px var(--shadow)}
.stat .n{font-size:26px;font-weight:900}
.stat .l{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.crit{color:var(--crit)} .high{color:var(--high)} .med{color:var(--med)} .low{color:var(--low)} .ok{color:var(--ok)}
.cols{display:grid;grid-template-columns:340px 1fr 320px;gap:16px}
@media(max-width:1080px){.cols{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--edge);border-radius:16px;padding:16px;backdrop-filter:blur(16px);box-shadow:0 10px 26px var(--shadow)}
.panel h2{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.dev{cursor:pointer;border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;transition:border .2s,transform .12s,background .2s;display:flex;align-items:center;gap:11px}
.dev:hover{transform:translateX(3px);border-color:var(--accent)}
.dev.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.dev .ring{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:13px;flex-shrink:0;border:2px solid}
.dev .meta{flex:1;min-width:0}
.dev .meta .id{font-weight:700;font-size:13px}
.dev .meta .os{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
.dev .cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-align:right}
.detail .dhead{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.detail .dhead .h{font-size:18px;font-weight:800}
.detail .dhead .r{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim)}
.group{margin-top:14px}
.group .gt{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.ctrl{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;font-size:13px;transition:border .2s,background .2s}
.ctrl .cinfo{flex:1;min-width:0}
.ctrl .cinfo .ct{font-weight:600}
.ctrl .cinfo .cs{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
.ctrl.fail{border-color:color-mix(in srgb,var(--crit) 45%,transparent)}
.ctrl.pass{opacity:.62}
.pill{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.toggle{position:relative;width:42px;height:23px;border-radius:99px;background:var(--crit);cursor:pointer;transition:background .25s;flex-shrink:0;border:none}
.toggle.on{background:var(--ok)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .25s}
.toggle.on::after{left:21px}
.patchbtn{cursor:pointer;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:8px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
.patchbtn:hover{background:color-mix(in srgb,var(--accent) 15%,transparent)}
.soar{max-height:560px;overflow-y:auto}
.action{border-left:2px solid var(--accent);padding:7px 10px;margin-bottom:7px;background:color-mix(in srgb,var(--accent) 6%,transparent);border-radius:0 8px 8px 0;font-size:12px}
.action .do{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent)}
.action .pb{font-size:10px;color:var(--dim);margin-top:2px}
.flash{animation:fl .7s ease}
@keyframes fl{0%{background:color-mix(in srgb,var(--accent) 30%,transparent)}100%{}}
.empty{color:var(--dim);font-size:12px;font-style:italic;padding:6px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <div><h1>Workforce <span class="a">Sentinel</span> · interactive console</h1>
  <div class="sub">click a device, then flip a control or patch a CVE and watch risk + SOAR react</div></div>
  <div class="spacer"></div>
  <button class="btn" onclick="resetState()">RESET</button>
  <button class="btn" id="tg" onclick="toggleTheme()">THEME</button>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div class="cols">
    <div class="panel"><h2>Fleet</h2><div id="fleet"></div></div>
    <div class="panel detail" id="detail"><h2>Device detail</h2><div class="empty">Select a device from the fleet.</div></div>
    <div class="panel"><h2>SOAR actions (live)</h2><div class="soar" id="soar"></div></div>
  </div>
</main>

<script>
const INITIAL = [
  {device_id:"MAC-001",hostname:"ash-mbp",platform:"macos",os:"macOS 15.5",owner:"ash",disk_encryption:true,firewall:true,screen_lock:true,os_up_to_date:true,edr_installed:true,
   config:{filevault:true,gatekeeper:true,sip:true,firewall:true,auto_updates:true,screen_lock_minutes:5,remote_login:false,sharing_services:[]},
   installed:[{name:"openssl",version:"3.0.11"},{name:"curl",version:"8.6.0"}]},
  {device_id:"WIN-004",hostname:"fin-laptop",platform:"windows",os:"Windows 11 22H2",owner:"jdoe",disk_encryption:false,firewall:true,screen_lock:false,os_up_to_date:false,edr_installed:true,
   installed:[{name:"log4j",version:"2.14.1"},{name:"openssl",version:"1.0.2k"}]},
  {device_id:"MAC-007",hostname:"eng-mbp",platform:"macos",os:"macOS 14.2",owner:"mlee",disk_encryption:true,firewall:false,screen_lock:true,os_up_to_date:false,edr_installed:true,
   config:{filevault:true,gatekeeper:false,sip:true,firewall:false,auto_updates:false,screen_lock_minutes:60,remote_login:true,sharing_services:["screen_sharing","file_sharing"]},
   installed:[{name:"log4j",version:"2.17.1"},{name:"openssl",version:"3.0.13"}]},
  {device_id:"LNX-002",hostname:"build-server",platform:"linux",os:"Ubuntu 22.04",owner:"ci",disk_encryption:false,firewall:true,screen_lock:true,os_up_to_date:true,edr_installed:false,
   installed:[{name:"openssl",version:"1.0.1f"},{name:"sudo",version:"1.9.5"}]},
  {device_id:"WIN-011",hostname:"sales-laptop",platform:"windows",os:"Windows 10 21H2",owner:"kchen",disk_encryption:true,firewall:true,screen_lock:true,os_up_to_date:true,edr_installed:true,
   installed:[{name:"curl",version:"7.68.0"},{name:"openssl",version:"3.0.13"}]}
];
const CVES = [
  {cve:"CVE-2021-44228",name:"Log4Shell",product:"log4j",affected:"<2.15.0",cvss:10.0,kev:true},
  {cve:"CVE-2014-0160",name:"Heartbleed",product:"openssl",affected:"1.0.1*",cvss:7.5,kev:true},
  {cve:"CVE-2016-2107",name:"OpenSSL Padding Oracle",product:"openssl",affected:"1.0.2k",cvss:5.9,kev:false},
  {cve:"CVE-2021-3156",name:"Sudo Baron Samedit",product:"sudo",affected:"<1.9.5p2",cvss:7.8,kev:true},
  {cve:"CVE-2023-38545",name:"curl SOCKS5 heap overflow",product:"curl",affected:"<8.4.0",cvss:8.8,kev:false}
];
const PLAYBOOKS = [
  {name:"Critical / KEV vulnerability response",match:{type:"vuln",severity_in:["critical"]},actions:[{do:"open_ticket",priority:"P1"},{do:"notify",channel:"secops"},{do:"create_remediation_task",sla_hours:24},{do:"flag_for_isolation"}]},
  {name:"Unencrypted disk -> block access (device trust)",match:{type:"posture",control:"disk_encryption"},actions:[{do:"notify",channel:"device-owner"},{do:"open_ticket",priority:"P2"},{do:"flag_block_access"}]},
  {name:"OS configuration drift -> patch",match:{type:"posture",control:"os_up_to_date"},actions:[{do:"schedule_patch"},{do:"notify",channel:"endpoint-ops"}]},
  {name:"CIS L1 hardening failure -> MDM remediate",match:{type:"hardening",severity_in:["high"]},actions:[{do:"open_ticket",priority:"P2"},{do:"apply_mdm_remediation_profile"},{do:"notify",channel:"endpoint-ops"}]}
];
const SEV_W = {critical:10,high:6,medium:3,low:1};
const SEV_ORDER = {critical:0,high:1,medium:2,low:3};

const POSTURE = [
  {key:"disk_encryption",sev:"high",title:"Disk encryption (FileVault / BitLocker)"},
  {key:"firewall",sev:"medium",title:"Host firewall enabled"},
  {key:"screen_lock",sev:"low",title:"Screen lock enabled"},
  {key:"os_up_to_date",sev:"high",title:"OS patched to baseline"},
  {key:"edr_installed",sev:"high",title:"EDR agent installed"}
];
const CIS = [
  {id:"CIS 2.5.1",sev:"high",title:"Enable FileVault",type:"boolTrue",key:"filevault"},
  {id:"CIS 2.5.2",sev:"high",title:"Enable Gatekeeper",type:"boolTrue",key:"gatekeeper"},
  {id:"CIS 5.1.1",sev:"high",title:"Enable SIP",type:"boolTrue",key:"sip"},
  {id:"CIS 2.2.1",sev:"high",title:"Enable application firewall",type:"boolTrue",key:"firewall"},
  {id:"CIS 1.1",sev:"medium",title:"Automatic security updates",type:"boolTrue",key:"auto_updates"},
  {id:"CIS 2.10.1",sev:"medium",title:"Lock screen within 5 min",type:"lockMins",key:"screen_lock_minutes"},
  {id:"CIS 2.3.1",sev:"high",title:"Disable Remote Login (SSH)",type:"boolFalse",key:"remote_login"},
  {id:"CIS 2.3.2",sev:"medium",title:"Disable unnecessary sharing",type:"list",key:"sharing_services"}
];

let state, selected = null;

function clone(o){return JSON.parse(JSON.stringify(o));}

function vnums(v){let p=(String(v).match(/\d+/g)||[]).map(Number);while(p.length<4)p.push(0);return p;}
function vless(a,b){a=vnums(a);b=vnums(b);for(let i=0;i<4;i++){if(a[i]<b[i])return true;if(a[i]>b[i])return false;}return false;}
function affected(version,rule){rule=rule.trim();if(rule.startsWith("<"))return vless(version,rule.slice(1));if(rule.endsWith("*"))return version.startsWith(rule.slice(0,-1));return version===rule;}
function cveSeverity(c){if(c.kev)return"critical";if(c.cvss>=9)return"critical";if(c.cvss>=7)return"high";if(c.cvss>=4)return"medium";return"low";}

function cisOk(ctrl,cfg){
  const v=cfg[ctrl.key];
  if(ctrl.type==="boolTrue")return v===true;
  if(ctrl.type==="boolFalse")return v===false;
  if(ctrl.type==="lockMins")return typeof v==="number"&&v<=5;
  if(ctrl.type==="list")return!v||v.length===0;
  return true;
}
function cisSetCompliant(ctrl,cfg,compliant){
  if(ctrl.type==="boolTrue")cfg[ctrl.key]=compliant;
  else if(ctrl.type==="boolFalse")cfg[ctrl.key]=!compliant;
  else if(ctrl.type==="lockMins")cfg[ctrl.key]=compliant?5:60;
  else if(ctrl.type==="list")cfg[ctrl.key]=compliant?[]:["screen_sharing"];
}

function scanDevice(d){
  const f=[];
  POSTURE.forEach(p=>{if(!d[p.key])f.push({type:"posture",device_id:d.device_id,control:p.key,severity:p.sev,description:"FAIL: "+p.title});});
  if(d.platform==="macos"&&d.config){
    CIS.forEach(c=>{if(!cisOk(c,d.config))f.push({type:"hardening",device_id:d.device_id,control:c.id,severity:c.sev,description:"FAIL ["+c.id+"] "+c.title});});
  }
  (d.installed||[]).forEach(sw=>{
    CVES.forEach(cve=>{if(sw.name===cve.product&&affected(sw.version,cve.affected))
      f.push({type:"vuln",device_id:d.device_id,product:sw.name,version:sw.version,cve:cve.cve,name:cve.name,kev:!!cve.kev,severity:cveSeverity(cve),description:cve.cve+" ("+cve.name+") in "+sw.name+" "+sw.version});});
  });
  return f;
}
function allFindings(){return state.flatMap(scanDevice);}
function deviceRisk(d){return scanDevice(d).reduce((s,f)=>s+(SEV_W[f.severity]||0),0);}
function runEngine(findings){
  const out=[];
  findings.forEach(f=>PLAYBOOKS.forEach(pb=>{const m=pb.match;
    if(m.type&&f.type!==m.type)return;
    if(m.severity_in&&!m.severity_in.includes(f.severity))return;
    if(m.control&&f.control!==m.control)return;
    pb.actions.forEach(a=>out.push({playbook:pb.name,device_id:f.device_id,action:a}));
  }));
  return out;
}

function ringColor(score){if(score>=20)return"var(--crit)";if(score>=10)return"var(--high)";if(score>=4)return"var(--med)";if(score>0)return"var(--low)";return"var(--ok)";}

function renderSummary(){
  const f=allFindings();
  const by={critical:0,high:0,medium:0,low:0};f.forEach(x=>by[x.severity]++);
  const totalRisk=state.reduce((s,d)=>s+deviceRisk(d),0);
  document.getElementById("summary").innerHTML=
    `<div class="stat"><div class="n">${state.length}</div><div class="l">devices</div></div>
     <div class="stat"><div class="n">${totalRisk}</div><div class="l">total fleet risk</div></div>
     <div class="stat"><div class="n crit">${by.critical}</div><div class="l">critical</div></div>
     <div class="stat"><div class="n high">${by.high}</div><div class="l">high</div></div>
     <div class="stat"><div class="n med">${by.medium}</div><div class="l">medium</div></div>
     <div class="stat"><div class="n low">${by.low}</div><div class="l">low</div></div>`;
}
function renderFleet(){
  const el=document.getElementById("fleet");
  const rows=clone(state).sort((a,b)=>deviceRisk(b)-deviceRisk(a));
  el.innerHTML=rows.map(d=>{const r=deviceRisk(d),c=scanDevice(d).length,col=ringColor(r);
    return `<div class="dev ${selected===d.device_id?'sel':''}" onclick="selectDevice('${d.device_id}')">
      <div class="ring" style="border-color:${col};color:${col}">${r}</div>
      <div class="meta"><div class="id">${d.device_id}</div><div class="os">${d.os}</div></div>
      <div class="cnt">${c} finding${c===1?'':'s'}<br>${d.platform}</div></div>`;}).join("");
}
function pill(sev){return `<span class="pill ${sev}" style="background:color-mix(in srgb,var(--${sev}) 18%,transparent);color:var(--${sev})">${sev}</span>`;}

function renderDetail(){
  const el=document.getElementById("detail");
  if(!selected){el.innerHTML='<h2>Device detail</h2><div class="empty">Select a device from the fleet.</div>';return;}
  const d=state.find(x=>x.device_id===selected);
  const r=deviceRisk(d);
  let html=`<h2>Device detail</h2><div class="dhead"><span class="h">${d.device_id}</span><span class="r">${d.os} · ${d.platform} · owner ${d.owner} · risk ${r}</span></div>`;

  html+='<div class="group"><div class="gt">Posture baseline</div>';
  POSTURE.forEach(p=>{const ok=!!d[p.key];
    html+=`<div class="ctrl ${ok?'pass':'fail'}"><div class="cinfo"><div class="ct">${p.title}</div><div class="cs">${ok?'compliant':'FAIL'} · ${pill(p.sev)}</div></div>
      <button class="toggle ${ok?'on':''}" onclick="togglePosture('${d.device_id}','${p.key}')"></button></div>`;});
  html+='</div>';

  if(d.platform==="macos"&&d.config){
    html+='<div class="group"><div class="gt">CIS macOS hardening (Level 1)</div>';
    CIS.forEach(c=>{const ok=cisOk(c,d.config);
      html+=`<div class="ctrl ${ok?'pass':'fail'}"><div class="cinfo"><div class="ct">${c.title}</div><div class="cs">${c.id} · ${ok?'compliant':'FAIL'} · ${pill(c.sev)}</div></div>
        <button class="toggle ${ok?'on':''}" onclick="toggleCis('${d.device_id}','${c.id}')"></button></div>`;});
    html+='</div>';
  }

  const vulns=scanDevice(d).filter(f=>f.type==="vuln");
  html+='<div class="group"><div class="gt">Vulnerabilities</div>';
  if(!vulns.length)html+='<div class="empty">No matching CVEs. Nice.</div>';
  vulns.forEach(v=>{html+=`<div class="ctrl fail"><div class="cinfo"><div class="ct">${v.cve} ${v.kev?'· KEV':''}</div><div class="cs">${v.name} in ${v.product} ${v.version} · ${pill(v.severity)}</div></div>
    <button class="patchbtn" onclick="patchVuln('${d.device_id}','${v.product}')">PATCH</button></div>`;});
  html+='</div>';
  el.innerHTML=html;
}
function renderSoar(){
  const el=document.getElementById("soar");
  const acts=runEngine(allFindings());
  if(!acts.length){el.innerHTML='<div class="empty">No actions firing. Fleet is clean.</div>';return;}
  el.innerHTML=acts.map(a=>{const x=a.action;const extra=Object.keys(x).filter(k=>k!=="do").map(k=>k+"="+x[k]).join(" ");
    return `<div class="action"><span class="do">${x.do}</span> ${extra?'<span class="cs mono" style="font-size:10px;color:var(--dim)">'+extra+'</span>':''}<div class="pb">${a.device_id} · ${a.playbook}</div></div>`;}).join("");
}
function flash(id){const e=document.getElementById(id);e.classList.remove("flash");void e.offsetWidth;e.classList.add("flash");}
function renderAll(){renderSummary();renderFleet();renderDetail();renderSoar();flash("soar");}

function selectDevice(id){selected=id;renderAll();}
function togglePosture(id,key){const d=state.find(x=>x.device_id===id);d[key]=!d[key];renderAll();}
function toggleCis(id,cid){const d=state.find(x=>x.device_id===id);const c=CIS.find(x=>x.id===cid);cisSetCompliant(c,d.config,!cisOk(c,d.config));renderAll();}
function patchVuln(id,product){const d=state.find(x=>x.device_id===id);d.installed.forEach(sw=>{if(sw.name===product)sw.version="9.9.9";});renderAll();}
function resetState(){state=clone(INITIAL);renderAll();}
function toggleTheme(){const n=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",n);try{localStorage.setItem("ws-theme",n);}catch(e){}}

resetState();
</script>
</body>
</html>
